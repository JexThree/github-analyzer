<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analyzer</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
    <h2>GitHub Analyzer</h2>

    <a href="/users-page">
        Gestión de Usuarios
    </a>
</nav>

    <div class="container">

        <h1>GitHub Analyzer</h1>

        <div class="search-box">
            <input
                type="text"
                id="username"
                placeholder="Ingresa un usuario de GitHub"
            >

            <button onclick="searchUser()">
                Buscar
            </button>
        </div>

        <div id="result" class="hidden">

            <div class="card">
                <h2 id="name">Nombre</h2>

                <p>
                    <strong>Usuario:</strong>
                    <span id="login"></span>
                </p>

                <p>
                    <strong>Repositorios:</strong>
                    <span id="repos"></span>
                </p>

                <p>
                    <strong>Seguidores:</strong>
                    <span id="followers"></span>
                </p>

                <p>
                    <strong>Lenguaje principal:</strong>
                    <span id="language"></span>
                </p>

                <p>
                    <strong>Repositorio más popular:</strong>
                    <span id="popularRepo"></span>
                </p>
            </div>

            <div class="card">
                <canvas id="languageChart"></canvas>
            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
